<!doctype html>

<head>
<meta charset="utf-8">
<title>Mitt galleri - Johan Broo</title>

<style>
body {
  margin: 0;
  background-color: hotpink;
  font-family: "Comic Sans MS", sans-serif;
}

/* ===== MENY ===== */
nav {
  position: sticky;
  top: 0;
  background: linear-gradient(90deg, purple, deeppink);
  padding: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

nav a {
  display: inline-block;
  background: white;
  color: purple;
  text-decoration: none;
  margin: 8px;
  padding: 10px 20px;
  border-radius: 25px;
  font-weight: bold;
  transition: 0.3s;
}

nav a.active {
  background: yellow;
  color: black;
}

nav a:hover {
  background: yellow;
  color: black;
  transform: scale(1.1);
}

/* ===== GALLERI ===== */

.container {
  padding: 40px;
  text-align: center;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}
</style>
</head>
